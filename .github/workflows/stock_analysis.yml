name: Taiwan Stock Price Update

on:
  schedule:
    # 台灣時間 09:00-13:00 每30分鐘執行 (UTC 01:00-05:00)
    - cron: '0,30 1-5 * * *'
    # 台灣時間 18:00 執行 (UTC 10:00)
    - cron: '0 10 * * *'

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      process_mode:
        description: '處理模式 (TSE=上市, OTC=上櫃, BOTH=兩者)'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - 'TSE'
          - 'OTC'
          - 'BOTH'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-stock-prices:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytz aiohttp pandas requests

      - name: Verify StockInfo directory and ranking files
        run: |
          echo "📁 Checking StockInfo directory..."
          if [ -d "StockInfo" ]; then
            echo "✅ StockInfo directory exists"
            echo "📄 Listing ranking files:"
            ls -lh StockInfo/*_buy_ranking.txt 2>/dev/null || echo "❌ No ranking files found"
          else
            echo "❌ StockInfo directory not found"
            exit 1
          fi

      - name: Run stock analysis
        env:
          PROCESS_MODE: ${{ github.event.inputs.process_mode || 'BOTH' }}
        run: |
          TAIWAN_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          echo "🕐 Current Taiwan time: $TAIWAN_TIME"
          python stock_analysis.py

      - name: Commit and push changes
        run: |
          TAIWAN_TIME=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add StockInfo/*.html StockInfo/*.json
          if git diff --cached --quiet; then
            echo "No stock files changed."
          else
            git commit -m "📊 Update stock analysis - ${TAIWAN_TIME}"
            git pull --rebase origin main
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: StockInfo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
